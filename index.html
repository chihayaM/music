<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vynl · 音乐播放器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080706;
      --surface: #131210;
      --surface-2: #1c1a17;
      --surface-3: #242220;
      --accent: #c9a84c;
      --accent-dim: #8b7535;
      --accent-glow: rgba(201, 168, 76, 0.12);
      --text: #ece8df;
      --text-muted: #8a857d;
      --text-dim: #4a4640;
      --error: #c4554a;
      --success: #5a9e6f;
    }

    html, body {
      height: 100%;
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    #bgLayer { position: fixed; inset: 0; z-index: 0; transition: background 0.8s ease; }
    #bgLayer.bg-image { background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; }
    #bgOverlay {
      position: fixed; inset: 0; z-index: 1;
      background: rgba(8, 7, 6, 0.55);
      transition: opacity 0.5s ease;
    }
    #bgGrain {
      position: fixed; inset: 0; z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035; pointer-events: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 9999;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      max-width: 500px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #toast.info {
      background: rgba(201, 168, 76, 0.15);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--accent);
    }
    #toast.success {
      background: rgba(90, 158, 111, 0.15);
      border: 1px solid rgba(90, 158, 111, 0.3);
      color: var(--success);
    }
    #toast.error {
      background: rgba(196, 85, 74, 0.15);
      border: 1px solid rgba(196, 85, 74, 0.3);
      color: var(--error);
    }

    /* ─── Landing ─── */
    #landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #landing.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

    .landing-vinyl {
      width: 180px; height: 180px; border-radius: 50%;
      background:
        radial-gradient(circle, var(--surface) 18%, transparent 19%),
        repeating-radial-gradient(circle at center, transparent 0px, transparent 4px, rgba(255,255,255,0.02) 5px, transparent 6px),
        radial-gradient(circle, #111 0%, #1a1a1a 100%);
      margin-bottom: 40px; cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 80px rgba(201, 168, 76, 0.06);
      animation: landingPulse 3s ease-in-out infinite;
    }
    .landing-vinyl:hover { transform: scale(1.05); box-shadow: 0 0 120px rgba(201, 168, 76, 0.12); }
    .landing-vinyl::after {
      content: ''; position: absolute;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.3);
    }
    @keyframes landingPulse {
      0%, 100% { box-shadow: 0 0 60px rgba(201, 168, 76, 0.05); }
      50% { box-shadow: 0 0 100px rgba(201, 168, 76, 0.1); }
    }

    .landing-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem; font-weight: 700; letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .landing-sub {
      font-size: 0.75rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 48px;
    }

    .landing-actions {
      display: flex; gap: 14px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 32px;
    }

    .landing-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      border: 1px solid var(--accent-dim);
      background: transparent; color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
      transition: all 0.3s ease; position: relative; overflow: hidden;
      border-radius: 2px;
    }
    .landing-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent); transform: translateX(-101%);
      transition: transform 0.3s ease;
    }
    .landing-btn:hover { color: var(--bg); border-color: var(--accent); }
    .landing-btn:hover::before { transform: translateX(0); }
    .landing-btn span { position: relative; z-index: 1; }
    .landing-btn svg { position: relative; z-index: 1; width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    .landing-btn.secondary {
      border-color: var(--text-dim); color: var(--text-muted);
    }
    .landing-btn.secondary:hover { color: var(--text); border-color: var(--text-muted); }
    .landing-btn.secondary::before { background: var(--text-muted); }

    .landing-info {
      display: flex; flex-direction: column; gap: 8px;
      align-items: center;
    }
    .landing-hint {
      font-size: 0.68rem; color: var(--text-dim);
      letter-spacing: 0.06em; text-align: center;
      max-width: 520px; line-height: 1.6;
    }
    .landing-status {
      font-size: 0.68rem; letter-spacing: 0.04em;
      min-height: 1.4em;
    }
    .landing-status.scanning { color: var(--accent); }
    .landing-status.found { color: var(--success); }
    .landing-status.failed { color: var(--text-dim); }

    .drop-overlay {
      position: fixed; inset: 0;
      background: rgba(8, 7, 6, 0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .drop-overlay.active { opacity: 1; pointer-events: all; }
    .drop-overlay-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--accent);
      border: 2px dashed var(--accent-dim);
      padding: 60px 80px; border-radius: 4px;
    }

    /* ─── Player ─── */
    #player {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: 1fr 380px;
      grid-template-rows: 1fr auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease 0.2s; z-index: 10;
    }
    #player.active { opacity: 1; pointer-events: all; }

    #visualizer {
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    .now-playing {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; z-index: 1; padding: 40px;
    }

    .vinyl-container { position: relative; width: 340px; height: 340px; margin-bottom: 48px; }

    .vinyl-disc {
      width: 340px; height: 340px; border-radius: 50%; position: relative;
      background:
        radial-gradient(circle, transparent 14%, #111 14.5%, #111 15%, transparent 15.5%),
        radial-gradient(circle, transparent 44%, rgba(255,255,255,0.02) 44.5%, transparent 45%),
        repeating-radial-gradient(circle at center, transparent 0px, transparent 6px, rgba(255,255,255,0.015) 7px, transparent 8px),
        radial-gradient(circle, #111 0%, #181716 50%, #111 100%);
      box-shadow: 0 4px 40px rgba(0,0,0,0.6), inset 0 0 80px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }
    .vinyl-disc.spinning { animation: spin 2.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .vinyl-shine {
      position: absolute; inset: 0; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.03) 100%);
      pointer-events: none;
    }

    .vinyl-label {
      position: absolute; width: 110px; height: 110px;
      border-radius: 50%; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface-2); overflow: hidden; border: 3px solid #222;
    }
    .vinyl-label img { width: 100%; height: 100%; object-fit: cover; }
    .vinyl-label .label-placeholder {
      width: 100%; height: 100%; display: flex;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
    }
    .vinyl-label .label-placeholder svg { width: 28px; height: 28px; fill: var(--text-dim); }

    .tonearm {
      position: absolute; top: -10px; right: -30px; z-index: 2;
      transform-origin: 85% 12%;
      transform: rotate(-28deg);
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .tonearm.playing { transform: rotate(-6deg); }
    .tonearm-base {
      width: 18px; height: 18px; border-radius: 50%;
      background: #3a3835; border: 2px solid #4a4744;
      position: absolute; right: 0; top: 0;
    }
    .tonearm-arm {
      position: absolute; right: 6px; top: 8px;
      width: 4px; height: 160px;
      background: linear-gradient(to bottom, #666, #444);
      transform: rotate(-45deg); transform-origin: top center; border-radius: 2px;
    }
    .tonearm-head {
      position: absolute; right: 6px; top: 8px;
      width: 8px; height: 30px; background: #555;
      transform: rotate(-45deg); transform-origin: top center;
      border-radius: 2px; translate: 70px 145px;
    }

    .track-info { text-align: center; max-width: 400px; }
    .track-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 700;
      margin-bottom: 6px; line-height: 1.3;
      max-height: 3.9rem; overflow: hidden; text-overflow: ellipsis;
    }
    .track-meta {
      font-size: 0.75rem; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .playlist-panel {
      background: var(--surface);
      border-left: 1px solid rgba(255,255,255,0.04);
      display: flex; flex-direction: column; z-index: 1; position: relative;
    }

    .playlist-header {
      padding: 32px 28px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .playlist-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 400; letter-spacing: 0.06em;
    }
    .playlist-count {
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .playlist-tracks { flex: 1; overflow-y: auto; padding: 8px 0; }

    .playlist-item {
      display: flex; align-items: center;
      padding: 10px 28px; gap: 14px;
      cursor: pointer; transition: background 0.2s ease; position: relative;
    }
    .playlist-item:hover { background: rgba(255,255,255,0.03); }
    .playlist-item.active { background: var(--accent-glow); }
    .playlist-item.active::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent);
    }

    .pl-num { width: 24px; font-size: 0.7rem; color: var(--text-dim); text-align: right; flex-shrink: 0; }
    .playlist-item.active .pl-num { color: var(--accent); }

    .pl-eq { display: none; gap: 2px; align-items: flex-end; height: 14px; }
    .playlist-item.active.playing .pl-num span { display: none; }
    .playlist-item.active.playing .pl-eq { display: flex; }
    .pl-eq-bar {
      width: 3px; background: var(--accent); border-radius: 1px;
      animation: eqBounce 0.8s ease infinite alternate;
    }
    .pl-eq-bar:nth-child(2) { animation-delay: 0.2s; height: 60%; }
    .pl-eq-bar:nth-child(3) { animation-delay: 0.4s; height: 80%; }
    @keyframes eqBounce { from { height: 3px; } to { height: 14px; } }

    .pl-info { flex: 1; min-width: 0; }
    .pl-name { font-size: 0.78rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-item.active .pl-name { color: var(--accent); }
    .pl-duration { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }

    /* Playlist add button in header */
    .playlist-add-btn {
      background: none; border: 1px solid var(--text-dim);
      color: var(--text-dim); cursor: pointer;
      padding: 5px 12px; font-family: 'DM Mono', monospace;
      font-size: 0.62rem; letter-spacing: 0.08em;
      text-transform: uppercase; border-radius: 3px;
      transition: all 0.2s ease;
    }
    .playlist-add-btn:hover {
      border-color: var(--accent-dim); color: var(--accent);
    }

    .controls-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 0 28px 20px; z-index: 2; position: relative;
    }

    .progress-container {
      width: 100%; height: 20px;
      display: flex; align-items: center;
      cursor: pointer; position: relative; margin-bottom: 12px;
    }
    .progress-track {
      width: 100%; height: 3px;
      background: var(--surface-3); border-radius: 2px;
      position: relative; overflow: hidden; transition: height 0.15s ease;
    }
    .progress-container:hover .progress-track { height: 5px; }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; width: 0%;
      position: relative; transition: width 0.1s linear;
    }
    .progress-fill::after {
      content: ''; position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%) scale(0);
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
      transition: transform 0.15s ease;
    }
    .progress-container:hover .progress-fill::after {
      transform: translateY(-50%) scale(1);
    }
    .time-display {
      display: flex; justify-content: space-between;
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.05em; margin-bottom: 16px;
    }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .controls-center { display: flex; align-items: center; gap: 28px; }
    .controls-right { display: flex; align-items: center; gap: 16px; }
    .controls-left { width: 200px; display: flex; align-items: center; gap: 6px; }

    .ctrl-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px;
      transition: color 0.2s ease, transform 0.15s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .ctrl-btn.active { color: var(--accent); }

    .play-btn {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1.5px solid var(--text-muted); background: transparent;
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .play-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .play-btn:active { transform: scale(0.93); }
    .play-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .volume-group { display: flex; align-items: center; gap: 8px; }
    .volume-slider {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 3px;
      background: var(--surface-3); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text-muted); cursor: pointer; transition: background 0.2s;
    }
    .volume-slider::-webkit-slider-thumb:hover { background: var(--accent); }

    /* ─── Settings Panel ─── */
    #settingsPanel {
      position: fixed; top: 0; right: -420px;
      width: 400px; height: 100%;
      background: #0f0e0c;
      border-left: 1px solid rgba(255,255,255,0.06);
      z-index: 50; transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex; flex-direction: column;
      box-shadow: -20px 0 60px rgba(0,0,0,0.4);
    }
    #settingsPanel.open { right: 0; }

    .settings-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 49;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .settings-backdrop.open { opacity: 1; pointer-events: all; }

    .settings-header {
      padding: 32px 28px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .settings-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 400; letter-spacing: 0.04em;
    }
    .settings-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; transition: color 0.2s ease;
    }
    .settings-close:hover { color: var(--text); }
    .settings-close svg { width: 20px; height: 20px; fill: currentColor; }

    .settings-body { flex: 1; overflow-y: auto; padding: 24px 28px 40px; }

    .setting-group { margin-bottom: 32px; }
    .setting-label {
      font-size: 0.65rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 14px; display: block;
    }

    .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .preset-item {
      aspect-ratio: 1; border-radius: 8px; cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .preset-item:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .preset-item.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.3); }
    .preset-item .preset-check {
      position: absolute; bottom: 4px; right: 4px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent);
      display: none; align-items: center; justify-content: center;
    }
    .preset-item.active .preset-check { display: flex; }
    .preset-check svg { width: 10px; height: 10px; fill: var(--bg); }

    .custom-color-row { display: flex; gap: 10px; align-items: center; }
    .color-input-wrap {
      position: relative; width: 48px; height: 48px;
      border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
    }
    .color-input-wrap input[type="color"] {
      position: absolute; inset: -8px;
      width: 64px; height: 64px; border: none; cursor: pointer; background: none;
    }
    .custom-gradient-btn {
      flex: 1; padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      color: var(--text-muted); font-family: 'DM Mono', monospace;
      font-size: 0.72rem; cursor: pointer;
      transition: all 0.2s ease; text-align: center; letter-spacing: 0.05em;
    }
    .custom-gradient-btn:hover { border-color: var(--accent-dim); color: var(--accent); }

    .bg-image-upload {
      border: 2px dashed rgba(255,255,255,0.08); border-radius: 10px;
      padding: 24px; text-align: center; cursor: pointer;
      transition: all 0.2s ease; position: relative; overflow: hidden;
    }
    .bg-image-upload:hover { border-color: var(--accent-dim); background: rgba(201, 168, 76, 0.03); }
    .bg-image-upload.has-image { padding: 0; border-style: solid; border-color: var(--accent-dim); }
    .bg-image-upload.has-image img {
      width: 100%; height: 120px; object-fit: cover; display: block; border-radius: 8px;
    }
    .bg-image-upload-text { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.05em; }
    .bg-image-upload-icon { width: 32px; height: 32px; margin: 0 auto 8px; fill: var(--text-dim); display: block; }
    .bg-image-remove {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,0.7); border: none; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; opacity: 0; transition: opacity 0.2s;
    }
    .bg-image-upload.has-image:hover .bg-image-remove { opacity: 1; }

    .setting-slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .setting-slider-label { font-size: 0.7rem; color: var(--text-muted); width: 48px; flex-shrink: 0; }
    .setting-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: var(--surface-3);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    .setting-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

  <script>
    (() => {
      // ─── State ───
      const audio = new Audio();
      audio.volume = 0.8;
      audio.preload = 'metadata';

      let tracks = [];
      let currentIndex = -1;
      let isPlaying = false;
      let shuffleOn = false;
      let repeatMode = 0;
      let shuffleOrder = [];
      let audioCtx = null;
      let analyser = null;
      let sourceNode = null;
      let visualizerRAF = null;
      let vizEnabled = true;
      let vizIntensity = 35;

      let bgSettings = {
        type: 'preset', presetIndex: 0,
        solidColor: '#080706',
        gradientColor1: '#0a0a2e', gradientColor2: '#1a0a2e', gradientAngle: 135,
        imageDataUrl: null, overlayOpacity: 55, bgBlur: 0, accentColor: '#c9a84c'
      };

      const PRESETS = [
        { name: '深夜黑',  type: 'solid',   c1: '#080706' },
        { name: '深邃蓝',  type: 'gradient', c1: '#0a0a2e', c2: '#0d1b2a' },
        { name: '酒窖红',  type: 'gradient', c1: '#1a0a0a', c2: '#2a0d0d' },
        { name: '森林绿',  type: 'gradient', c1: '#0a1a0d', c2: '#0d2a12' },
        { name: '琥珀金',  type: 'gradient', c1: '#1a1400', c2: '#2a1f00' },
        { name: '紫罗兰',  type: 'gradient', c1: '#160a2e', c2: '#1a0d2a' },
        { name: '石墨',    type: 'solid',   c1: '#151515' },
        { name: '月光银',  type: 'gradient', c1: '#1a1a1f', c2: '#0d0d12' },
        { name: '极光',    type: 'gradient', c1: '#0a1a2e', c2: '#1a0a2e' },
        { name: '日落橙',  type: 'gradient', c1: '#2a1400', c2: '#1a0a00' },
        { name: '海洋',    type: 'gradient', c1: '#001a2a', c2: '#002a1a' },
        { name: '午夜蓝',  type: 'gradient', c1: '#05051a', c2: '#0a0a2e' },
      ];

      const AUDIO_EXTS = /\.(mp3|wav|ogg|flac|m4a|aac|wma|opus|webm)($|\?)/i;

      // ─── DOM ───
      const $ = id => document.getElementById(id);
      const toast = $('toast');
      const landing = $('landing');
      const player = $('player');
      const landingVinyl = $('landingVinyl');
      const openFolderBtn = $('openFolderBtn');
      const openFilesBtn = $('openFilesBtn');
      const folderInput = $('folderInput');
      const dropOverlay = $('dropOverlay');
      const landingStatus = $('landingStatus');
      const vinylDisc = $('vinylDisc');
      const tonearm = $('tonearm');
      const trackTitle = $('trackTitle');
      const trackMeta = $('trackMeta');
      const playlistTracks = $('playlistTracks');
      const playlistCount = $('playlistCount');
      const playlistAddBtn = $('playlistAddBtn');
      const progressContainer = $('progressContainer');
      const progressFill = $('progressFill');
      const currentTimeEl = $('currentTime');
      const totalTimeEl = $('totalTime');
      const playBtn = $('playBtn');
      const playIcon = $('playIcon');
      const prevBtn = $('prevBtn');
      const nextBtn = $('nextBtn');
      const shuffleBtn = $('shuffleBtn');
      const repeatBtn = $('repeatBtn');
      const volumeBtn = $('volumeBtn');
      const volumeIcon = $('volumeIcon');
      const volumeSlider = $('volumeSlider');
      const canvas = $('visualizer');
      const ctx = canvas.getContext('2d');

      const settingsBtn = $('settingsBtn');
      const settingsPanel = $('settingsPanel');
      const settingsBackdrop = $('settingsBackdrop');
      const settingsClose = $('settingsClose');
      const presetGrid = $('presetGrid');
      const customColorPicker = $('customColorPicker');
      const openGradientEditor = $('openGradientEditor');
      const bgImageUpload = $('bgImageUpload');
      const bgImageInput = $('bgImageInput');
      const bgImageRemove = $('bgImageRemove');
      const overlayOpacity = $('overlayOpacity');
      const overlayOpacityVal = $('overlayOpacityVal');
      const bgBlur = $('bgBlur');
      const bgBlurVal = $('bgBlurVal');
      const vizToggle = $('vizToggle');
      const vizIntensitySlider = $('vizIntensity');
      const vizIntensityVal = $('vizIntensityVal');
      const accentColorPicker = $('accentColorPicker');
      const resetSettingsBtn = $('resetSettings');

      const gradientModal = $('gradientModal');
      const gradientPreview = $('gradientPreview');
      const gradColor1 = $('gradColor1');
      const gradColor2 = $('gradColor2');
      const gradAngle = $('gradAngle');
      const gradAngleVal = $('gradAngleVal');
      const gradCancel = $('gradCancel');
      const gradApply = $('gradApply');

      const bgLayer = $('bgLayer');
      const bgOverlay = $('bgOverlay');

      // ─── Toast ───
      let toastTimer = null;
      function showToast(msg, type = 'info', duration = 3000) {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = type;
        requestAnimationFrame(() => toast.classList.add('show'));
        toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
      }

      // ─── Utilities ───
      function formatTime(sec) {
        if (!sec || isNaN(sec)) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      }

      function cleanName(filename) {
        return filename.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim();
      }

      function generateShuffleOrder() {
        shuffleOrder = tracks.map((_, i) => i);
        for (let i = shuffleOrder.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
        }
      }

      // ─── Auto-Load from ./music/ ───
      async function tryAutoLoad() {
        const status = landingStatus;

        // Check if we're running from file:// protocol
        if (window.location.protocol === 'file:') {
          status.className = 'landing-status failed';
          status.textContent = '⚠ file:// 协议不支持自动加载，请使用文件选择按钮或启动 HTTP 服务';
          return null;
        }

        status.className = 'landing-status scanning';
        status.textContent = '正在扫描 ./music/ 目录...';

        // Try multiple path patterns
        const paths = ['./music/', './music', 'music/', 'music'];

        for (const musicPath of paths) {
          try {
            const resp = await fetch(musicPath, { method: 'GET' });
            if (!resp.ok) continue;

            const ct = resp.headers.get('content-type') || '';
            // Some servers return text/html for directory listings
            const text = await resp.text();

            // Try parsing as HTML (Apache/Nginx directory listing)
            let urls = [];

            try {
              const doc = new DOMParser().parseFromString(text, 'text/html');
              const links = doc.querySelectorAll('a');
              for (const a of links) {
                const href = a.getAttribute('href');
                if (!href || href.startsWith('?') || href.startsWith('/') || href === '../') continue;
                const decoded = decodeURIComponent(href);
                if (AUDIO_EXTS.test(decoded)) {
                  const base = musicPath.endsWith('/') ? musicPath : musicPath + '/';
                  urls.push(base + decoded);
                }
              }
            } catch (e) {
              // Not HTML
            }

            // Also try parsing as JSON (custom API)
            if (urls.length === 0) {
              try {
                const json = JSON.parse(text);
                if (Array.isArray(json)) {
                  urls = json.filter(f => AUDIO_EXTS.test(f)).map(f => {
                    const base = musicPath.endsWith('/') ? musicPath : musicPath + '/';
                    return base + f;
                  });
                }
              } catch (e) {}
            }

            // Also try line-by-line (simple text listing)
            if (urls.length === 0) {
              const lines = text.split(/[\r\n]+/).filter(Boolean);
              for (const line of lines) {
                const trimmed = line.trim();
                if (AUDIO_EXTS.test(trimmed)) {
                  const base = musicPath.endsWith('/') ? musicPath : musicPath + '/';
                  urls.push(base + trimmed);
                }
              }
            }

            if (urls.length > 0) {
              // Verify each URL actually loads
              const verified = [];
              for (const u of urls) {
                try {
                  const headResp = await fetch(u, { method: 'HEAD' });
                  if (headResp.ok) verified.push(u);
                } catch (e) {
                  // Try anyway
                  verified.push(u);
                }
              }

              if (verified.length > 0) {
                status.className = 'landing-status found';
                status.textContent = `✓ 找到 ${verified.length} 首音乐`;
                return verified.map(u => ({
                  name: cleanName(decodeURIComponent(u.split('/').pop())),
                  url: u,
                  duration: null
                }));
              }
            }
          } catch (e) {
            // This path didn't work, try next
            continue;
          }
        }

        status.className = 'landing-status failed';
        status.textContent = '⚠ 未在 ./music/ 目录找到音乐，请使用按钮选择';
        return null;
      }

      // ─── Load from FileList ───
      function loadFromFiles(fileList) {
        const allFiles = Array.from(fileList);
        const audioFiles = allFiles.filter(f => AUDIO_EXTS.test(f.name));

        if (audioFiles.length === 0) {
          // Show what files were found for debugging
          const names = allFiles.slice(0, 5).map(f => f.name);
          console.log('Selected files:', names);
          showToast(`选中的 ${allFiles.length} 个文件中没有找到音频文件`, 'error', 4000);
          return;
        }

        tracks.forEach(t => { if (t.url.startsWith('blob:')) URL.revokeObjectURL(t.url); });

        tracks = audioFiles.map(f => ({
          name: cleanName(f.name),
          url: URL.createObjectURL(f),
          file: f,
          duration: null
        }));

        showToast(`已加载 ${tracks.length} 首音乐`, 'success');
        onTracksLoaded();
      }

      function loadFromUrls(urlList) {
        if (!urlList || urlList.length === 0) return;
        tracks = urlList;
        showToast(`已加载 ${tracks.length} 首音乐`, 'success');
        onTracksLoaded();
      }

      function onTracksLoaded() {
        generateShuffleOrder();
        renderPlaylist();
        tracks.forEach((t, i) => {
          const probe = new Audio();
          probe.preload = 'metadata';
          probe.src = t.url;
          probe.addEventListener('loadedmetadata', () => {
            t.duration = probe.duration;
            const el = document.querySelector(`.playlist-item[data-index="${i}"] .pl-duration`);
            if (el) el.textContent = formatTime(probe.duration);
            probe.src = '';
          });
          probe.addEventListener('error', () => {
            console.warn('Cannot read metadata for:', t.name);
          });
        });
        landing.classList.add('hidden');
        player.classList.add('active');
        playTrack(0);
      }

      // ─── Add more files to existing playlist ───
      function addFilesToList(fileList) {
        const audioFiles = Array.from(fileList).filter(f => AUDIO_EXTS.test(f.name));
        if (audioFiles.length === 0) {
          showToast('没有找到音频文件', 'error');
          return;
        }

        const startIndex = tracks.length;
        const newTracks = audioFiles.map(f => ({
          name: cleanName(f.name),
          url: URL.createObjectURL(f),
          file: f,
          duration: null
        }));

        tracks.push(...newTracks);
        generateShuffleOrder();
        renderPlaylist();
        showToast(`已添加 ${newTracks.length} 首音乐`, 'success');

        // Probe durations for new tracks
        newTracks.forEach((t, i) => {
          const idx = startIndex + i;
          const probe = new Audio();
          probe.preload = 'metadata';
          probe.src = t.url;
          probe.addEventListener('loadedmetadata', () => {
            t.duration = probe.duration;
            const el = document.querySelector(`.playlist-item[data-index="${idx}"] .pl-duration`);
            if (el) el.textContent = formatTime(probe.duration);
            probe.src = '';
          });
        });
      }

      function renderPlaylist() {
        playlistTracks.innerHTML = '';
        playlistCount.textContent = `${tracks.length} 首`;
        tracks.forEach((t, i) => {
          const div = document.createElement('div');
          div.className = 'playlist-item' + (i === currentIndex ? ' active' : '') + (i === currentIndex && isPlaying ? ' playing' : '');
          div.dataset.index = i;
          div.innerHTML = `
            <div class="pl-num">
              <span>${String(i + 1).padStart(2, '0')}</span>
              <div class="pl-eq"><div class="pl-eq-bar"></div><div class="pl-eq-bar"></div><div class="pl-eq-bar"></div></div>
            </div>
            <div class="pl-info">
              <div class="pl-name">${t.name}</div>
              <div class="pl-duration">${t.duration ? formatTime(t.duration) : '--:--'}</div>
            </div>
          `;
          div.addEventListener('click', () => playTrack(i));
          playlistTracks.appendChild(div);
        });
      }

      function playTrack(index) {
        if (index < 0 || index >= tracks.length) return;
        currentIndex = index;
        const track = tracks[index];
        audio.src = track.url;

        const playPromise = audio.play();
        if (playPromise) {
          playPromise.then(() => {
            isPlaying = true;
            updatePlayState();
          }).catch(err => {
            console.warn('Playback failed:', err);
            showToast('播放失败: ' + (err.message || '未知错误'), 'error');
          });
        }

        trackTitle.textContent = track.name;
        trackMeta.textContent = `曲目 ${index + 1} / ${tracks.length}`;
        updatePlaylistHighlight();
        initVisualizer();
      }

      function togglePlay() {
        if (currentIndex < 0 && tracks.length > 0) { playTrack(0); return; }
        if (isPlaying) { audio.pause(); isPlaying = false; }
        else { audio.play().catch(() => {}); isPlaying = true; }
        updatePlayState();
      }

      function updatePlayState() {
        if (isPlaying) {
          playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
          vinylDisc.classList.add('spinning');
          tonearm.classList.add('playing');
        } else {
          playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
          vinylDisc.classList.remove('spinning');
          tonearm.classList.remove('playing');
        }
        updatePlaylistHighlight();
      }

      function updatePlaylistHighlight() {
        document.querySelectorAll('.playlist-item').forEach(el => {
          const i = parseInt(el.dataset.index);
          el.classList.toggle('active', i === currentIndex);
          el.classList.toggle('playing', i === currentIndex && isPlaying);
        });
        const active = document.querySelector('.playlist-item.active');
        if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }

      function nextTrack() {
        if (tracks.length === 0) return;
        if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
        let next;
        if (shuffleOn) {
          const ci = shuffleOrder.indexOf(currentIndex);
          next = shuffleOrder[(ci + 1) % tracks.length];
        } else {
          next = (currentIndex + 1) % tracks.length;
        }
        if (next === 0 && repeatMode === 0 && !shuffleOn) {
          playTrack(0); audio.pause(); isPlaying = false; updatePlayState(); return;
        }
        playTrack(next);
      }

      function prevTrack() {
        if (tracks.length === 0) return;
        if (audio.currentTime > 3) { audio.currentTime = 0; return; }
        let prev;
        if (shuffleOn) {
          const ci = shuffleOrder.indexOf(currentIndex);
          prev = shuffleOrder[(ci - 1 + tracks.length) % tracks.length];
        } else {
          prev = (currentIndex - 1 + tracks.length) % tracks.length;
        }
        playTrack(prev);
      }

      function toggleShuffle() {
        shuffleOn = !shuffleOn;
        shuffleBtn.classList.toggle('active', shuffleOn);
        if (shuffleOn) generateShuffleOrder();
      }

      function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        repeatBtn.classList.toggle('active', repeatMode > 0);
        if (repeatMode === 2) {
          repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">1</text></svg>';
        } else {
          repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
        }
      }

      // ─── Progress ───
      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      });
      audio.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = formatTime(audio.duration); });
      audio.addEventListener('ended', nextTrack);
      audio.addEventListener('error', (e) => {
        if (currentIndex >= 0) {
          console.error('Audio error for:', tracks[currentIndex]?.name, e);
          showToast('无法播放: ' + tracks[currentIndex]?.name, 'error');
        }
      });

      let seeking = false;
      function seekFromEvent(e) {
        const rect = progressContainer.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        if (audio.duration) audio.currentTime = pct * audio.duration;
      }
      progressContainer.addEventListener('mousedown', e => { seeking = true; seekFromEvent(e); });
      document.addEventListener('mousemove', e => { if (seeking) seekFromEvent(e); });
      document.addEventListener('mouseup', () => { seeking = false; });

      // ─── Volume ───
      volumeSlider.addEventListener('input', () => { audio.volume = parseFloat(volumeSlider.value); updateVolumeIcon(); });
      volumeBtn.addEventListener('click', () => { audio.muted = !audio.muted; updateVolumeIcon(); });
      function updateVolumeIcon() {
        if (audio.muted || audio.volume === 0) {
          volumeIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
        } else if (audio.volume < 0.5) {
          volumeIcon.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>';
        } else {
          volumeIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
        }
      }

      // ─── Visualizer ───
      function initVisualizer() {
        if (audioCtx) {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          return;
        }
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 256;
          sourceNode = audioCtx.createMediaElementSource(audio);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
          resizeCanvas();
          drawVisualizer();
        } catch (e) { console.warn('Web Audio not available:', e); }
      }

      function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resizeCanvas);

      function drawVisualizer() {
        if (!vizEnabled) return;
        visualizerRAF = requestAnimationFrame(drawVisualizer);
        if (!analyser) return;
        const bufLen = analyser.frequencyBinCount;
        const data = new Uint8Array(bufLen);
        analyser.getByteFrequencyData(data);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const barCount = 80;
        const gap = 4;
        const barW = (canvas.width - gap * (barCount - 1)) / barCount;
        const maxH = (vizIntensity / 100) * canvas.height;
        for (let i = 0; i < barCount; i++) {
          const bin = Math.floor((i / barCount) * bufLen * 0.7);
          const val = data[bin] / 255;
          const h = val * maxH;
          ctx.fillStyle = `rgba(201, 168, 76, ${val * 0.08 + 0.01})`;
          ctx.fillRect(i * (barW + gap), canvas.height - h, barW, h);
        }
      }

      // ─── Background System ───
      function loadBgSettings() {
        try { const s = localStorage.getItem('vynl_bg_settings'); if (s) Object.assign(bgSettings, JSON.parse(s)); } catch (e) {}
      }
      function saveBgSettings() {
        try { localStorage.setItem('vynl_bg_settings', JSON.stringify(bgSettings)); } catch (e) {}
      }

      function applyBackground() {
        bgLayer.style.background = '';
        bgLayer.className = '';
        bgLayer.style.filter = '';
        switch (bgSettings.type) {
          case 'preset': {
            const p = PRESETS[bgSettings.presetIndex] || PRESETS[0];
            bgLayer.style.background = p.type === 'solid' ? p.c1 : `linear-gradient(${bgSettings.gradientAngle}deg, ${p.c1}, ${p.c2})`;
            break;
          }
          case 'solid': bgLayer.style.background = bgSettings.solidColor; break;
          case 'gradient': bgLayer.style.background = `linear-gradient(${bgSettings.gradientAngle}deg, ${bgSettings.gradientColor1}, ${bgSettings.gradientColor2})`; break;
          case 'image':
            if (bgSettings.imageDataUrl) { bgLayer.className = 'bg-image'; bgLayer.style.background = `url(${bgSettings.imageDataUrl})`; }
            else { bgLayer.style.background = '#080706'; }
            break;
        }
        if (bgSettings.bgBlur > 0) bgLayer.style.filter = `blur(${bgSettings.bgBlur}px)`;
        bgOverlay.style.opacity = bgSettings.overlayOpacity / 100;
        document.documentElement.style.setProperty('--accent', bgSettings.accentColor);
        const [r, g, b] = [parseInt(bgSettings.accentColor.slice(1,3),16), parseInt(bgSettings.accentColor.slice(3,5),16), parseInt(bgSettings.accentColor.slice(5,7),16)];
        document.documentElement.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.5)`);
        document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.12)`);
        saveBgSettings();
      }

      function renderPresets() {
        presetGrid.innerHTML = '';
        PRESETS.forEach((p, i) => {
          const div = document.createElement('div');
          div.className = 'preset-item' + (bgSettings.type === 'preset' && bgSettings.presetIndex === i ? ' active' : '');
          div.title = p.name;
          div.style.background = p.type === 'solid' ? p.c1 : `linear-gradient(135deg, ${p.c1}, ${p.c2})`;
          div.innerHTML = '<div class="preset-check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>';
          div.addEventListener('click', () => { bgSettings.type = 'preset'; bgSettings.presetIndex = i; applyBackground(); renderPresets(); });
          presetGrid.appendChild(div);
        });
      }

      function updateSettingsUI() {
        customColorPicker.value = bgSettings.solidColor;
        overlayOpacity.value = bgSettings.overlayOpacity;
        overlayOpacityVal.textContent = bgSettings.overlayOpacity + '%';
        bgBlur.value = bgSettings.bgBlur;
        bgBlurVal.textContent = bgSettings.bgBlur + 'px';
        accentColorPicker.value = bgSettings.accentColor;
        vizIntensitySlider.value = vizIntensity;
        vizIntensityVal.textContent = vizIntensity + '%';
        if (bgSettings.imageDataUrl) {
          bgImageUpload.classList.add('has-image');
          let img = bgImageUpload.querySelector('img');
          if (!img) { img = document.createElement('img'); bgImageUpload.insertBefore(img, bgImageUpload.firstChild); }
          img.src = bgSettings.imageDataUrl;
          bgImageUpload.querySelector('.bg-image-upload-icon')?.remove();
          bgImageUpload.querySelector('.bg-image-upload-text')?.remove();
        } else {
          bgImageUpload.classList.remove('has-image');
          bgImageUpload.querySelector('img')?.remove();
          if (!bgImageUpload.querySelector('.bg-image-upload-text')) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('bg-image-upload-icon');
            svg.setAttribute('viewBox', '0 0 24 24');
            svg.innerHTML = '<path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>';
            const text = document.createElement('div');
            text.className = 'bg-image-upload-text';
            text.textContent = '点击上传图片';
            bgImageUpload.insertBefore(svg, bgImageRemove);
            bgImageUpload.insertBefore(text, bgImageRemove);
          }
        }
        renderPresets();
      }

      // Settings
      function openSettings() { settingsPanel.classList.add('open'); settingsBackdrop.classList.add('open'); }
      function closeSettings() { settingsPanel.classList.remove('open'); settingsBackdrop.classList.remove('open'); }
      settingsBtn.addEventListener('click', openSettings);
      settingsClose.addEventListener('click', closeSettings);
      settingsBackdrop.addEventListener('click', closeSettings);

      customColorPicker.addEventListener('input', () => { bgSettings.type = 'solid'; bgSettings.solidColor = customColorPicker.value; applyBackground(); renderPresets(); });

      openGradientEditor.addEventListener('click', () => {
        gradColor1.value = bgSettings.gradientColor1; gradColor2.value = bgSettings.gradientColor2;
        gradAngle.value = bgSettings.gradientAngle; gradAngleVal.textContent = bgSettings.gradientAngle + '°';
        updateGradientPreview(); gradientModal.classList.add('open');
      });
      function updateGradientPreview() { gradientPreview.style.background = `linear-gradient(${gradAngle.value}deg, ${gradColor1.value}, ${gradColor2.value})`; }
      gradColor1.addEventListener('input', updateGradientPreview);
      gradColor2.addEventListener('input', updateGradientPreview);
      gradAngle.addEventListener('input', () => { gradAngleVal.textContent = gradAngle.value + '°'; updateGradientPreview(); });
      gradCancel.addEventListener('click', () => gradientModal.classList.remove('open'));
      gradApply.addEventListener('click', () => {
        bgSettings.type = 'gradient'; bgSettings.gradientColor1 = gradColor1.value;
        bgSettings.gradientColor2 = gradColor2.value; bgSettings.gradientAngle = parseInt(gradAngle.value);
        gradientModal.classList.remove('open'); applyBackground(); renderPresets();
      });
      gradientModal.addEventListener('click', e => { if (e.target === gradientModal) gradientModal.classList.remove('open'); });

      bgImageUpload.addEventListener('click', e => { if (e.target !== bgImageRemove && !bgImageRemove.contains(e.target)) bgImageInput.click(); });
      bgImageInput.addEventListener('change', () => {
        const file = bgImageInput.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = e => { bgSettings.imageDataUrl = e.target.result; bgSettings.type = 'image'; applyBackground(); updateSettingsUI(); };
        reader.readAsDataURL(file); bgImageInput.value = '';
      });
      bgImageRemove.addEventListener('click', e => {
        e.stopPropagation(); bgSettings.imageDataUrl = null;
        if (bgSettings.type === 'image') { bgSettings.type = 'preset'; bgSettings.presetIndex = 0; }
        applyBackground(); updateSettingsUI();
      });

      overlayOpacity.addEventListener('input', () => { bgSettings.overlayOpacity = parseInt(overlayOpacity.value); overlayOpacityVal.textContent = overlayOpacity.value + '%'; applyBackground(); });
      bgBlur.addEventListener('input', () => { bgSettings.bgBlur = parseInt(bgBlur.value); bgBlurVal.textContent = bgBlur.value + 'px'; applyBackground(); });
      vizToggle.addEventListener('click', () => {
        vizEnabled = !vizEnabled; vizToggle.classList.toggle('on', vizEnabled);
        if (!vizEnabled) { cancelAnimationFrame(visualizerRAF); ctx.clearRect(0, 0, canvas.width, canvas.height); }
        else drawVisualizer();
      });
      vizIntensitySlider.addEventListener('input', () => { vizIntensity = parseInt(vizIntensitySlider.value); vizIntensityVal.textContent = vizIntensity + '%'; });
      accentColorPicker.addEventListener('input', () => { bgSettings.accentColor = accentColorPicker.value; applyBackground(); });
      resetSettingsBtn.addEventListener('click', () => {
        bgSettings = { type: 'preset', presetIndex: 0, solidColor: '#080706', gradientColor1: '#0a0a2e', gradientColor2: '#1a0a2e', gradientAngle: 135, imageDataUrl: null, overlayOpacity: 55, bgBlur: 0, accentColor: '#c9a84c' };
        vizEnabled = true; vizIntensity = 35; vizToggle.classList.add('on');
        applyBackground(); updateSettingsUI(); showToast('设置已重置', 'info');
      });

      // ─── File Selection ───
      // Hidden input for individual files
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.multiple = true;
      fileInput.accept = 'audio/*,.mp3,.wav,.ogg,.flac,.m4a,.aac,.wma,.opus,.webm';
      fileInput.style.display = 'none';
      document.body.appendChild(fileInput);

      openFolderBtn.addEventListener('click', () => folderInput.click());
      landingVinyl.addEventListener('click', () => folderInput.click());
      openFilesBtn.addEventListener('click', () => fileInput.click());

      folderInput.addEventListener('change', () => {
        if (folderInput.files.length > 0) loadFromFiles(folderInput.files);
      });
      fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) loadFromFiles(fileInput.files);
      });

      playlistAddBtn.addEventListener('click', () => fileInput.click());

      // ─── Drag & Drop ───
      let dragCounter = 0;
      document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
      document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
      document.addEventListener('dragover', e => { e.preventDefault(); });
      document.addEventListener('drop', e => {
        e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active');
        const items = e.dataTransfer.items;
        if (items && items.length > 0) {
          const allFiles = [];
          let pending = 0;
          let hasEntries = false;

          for (const item of items) {
            const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
            if (entry) {
              hasEntries = true;
              pending++;
              readEntry(entry, allFiles, () => {
                pending--;
                if (pending === 0) {
                  if (allFiles.length > 0) {
                    if (player.classList.contains('active')) addFilesToList(allFiles);
                    else loadFromFiles(allFiles);
                  } else {
                    showToast('未在拖拽内容中找到音频文件', 'error');
                  }
                }
              });
            }
          }

          if (!hasEntries) {
            const files = e.dataTransfer.files;
            if (player.classList.contains('active')) addFilesToList(files);
            else loadFromFiles(files);
          }
        }
      });

      function readEntry(entry, files, cb) {
        if (entry.isFile) {
          entry.file(f => { files.push(f); cb(); }, cb);
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          const readAll = () => {
            reader.readEntries(entries => {
              if (entries.length === 0) { cb(); return; }
              let subPending = entries.length;
              entries.forEach(sub => {
                readEntry(sub, files, () => { subPending--; if (subPending === 0) readAll(); });
              });
            }, cb);
          };
          readAll();
        } else { cb(); }
      }

      // Keyboard
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.code) {
          case 'Space': e.preventDefault(); togglePlay(); break;
          case 'ArrowRight': e.preventDefault(); if (e.shiftKey) nextTrack(); else if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); break;
          case 'ArrowLeft': e.preventDefault(); if (e.shiftKey) prevTrack(); else if (audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 5); break;
          case 'ArrowUp': e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.05); volumeSlider.value = audio.volume; updateVolumeIcon(); break;
          case 'ArrowDown': e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.05); volumeSlider.value = audio.volume; updateVolumeIcon(); break;
          case 'KeyS': toggleShuffle(); break;
          case 'KeyR': toggleRepeat(); break;
          case 'KeyM': audio.muted = !audio.muted; updateVolumeIcon(); break;
          case 'Escape': closeSettings(); gradientModal.classList.remove('open'); break;
        }
      });

      // Play/Pause button
      playBtn.addEventListener('click', togglePlay);
      nextBtn.addEventListener('click', nextTrack);
      prevBtn.addEventListener('click', prevTrack);
      shuffleBtn.addEventListener('click', toggleShuffle);
      repeatBtn.addEventListener('click', toggleRepeat);

      // ─── Init ───
      loadBgSettings();
      applyBackground();
      updateSettingsUI();

      (async () => {
        const autoTracks = await tryAutoLoad();
        if (autoTracks && autoTracks.length > 0) {
          loadFromUrls(autoTracks);
        }
      })();

    })();
  </script>
</body>
</html>
