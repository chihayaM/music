<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芙芙播放器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="APlayer.min.css">
    <style>
        :root {
            --sky-top: #060a1e; --sky-mid: #0e1435; --sky-bot: #1a1050;
            --gold: #ffd700; --gold-dim: rgba(255,215,0,0.07); --gold-glow: rgba(255,215,0,0.13);
            --text: #c4cef8; --text-bright: #eef0ff;
            --surface: rgba(12,16,40,0.9); --border: rgba(255,255,255,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(160deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bot) 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; overflow-x: hidden;
        }
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: tw var(--d) ease-in-out infinite alternate; }
        @keyframes tw { 0% { opacity: var(--lo); transform: scale(0.8); } 100% { opacity: var(--hi); transform: scale(1.2); } }
        .glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
        .glow--1 { width: 600px; height: 600px; background: rgba(30,20,80,0.5); top: -15%; left: -10%; }
        .glow--2 { width: 450px; height: 450px; background: rgba(255,215,0,0.02); bottom: -8%; right: -5%; }
        .shell {
            position: relative; z-index: 10; width: 720px; max-width: 100%;
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 36px 32px 28px; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 16px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
            animation: si 0.7s ease-out both;
        }
        @keyframes si { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: none; } }
        .hdr { text-align: center; margin-bottom: 32px; }
        .hdr h1 { font-size: 1.3rem; font-weight: 700; color: var(--text-bright); letter-spacing: 0.2em; text-shadow: 0 0 24px rgba(196,206,248,0.2); }
        .hdr p { font-size: 0.68rem; color: var(--text); opacity: 0.22; margin-top: 6px; letter-spacing: 0.35em; }
        .st { text-align: center; padding: 80px 20px; color: var(--text); opacity: 0.45; font-size: 0.9rem; letter-spacing: 0.1em; }
        .da::after { content: ''; animation: dd 1.4s steps(4,end) infinite; }
        @keyframes dd { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
        .grid { display: grid; grid-template-columns: 230px 1fr; gap: 32px; align-items: start; }
        .lcol { display: flex; flex-direction: column; align-items: center; }
        .cw { margin-bottom: 24px; }
        .cd {
            position: relative; width: 200px; height: 200px; border-radius: 50%; overflow: hidden;
            border: 3px solid rgba(255,255,255,0.06);
            box-shadow: 0 0 0 12px var(--gold-dim), 0 0 50px rgba(255,215,0,0.04);
            animation: sp 24s linear infinite; animation-play-state: paused; transition: box-shadow 0.5s;
        }
        .cd.on { animation-play-state: running; box-shadow: 0 0 0 12px var(--gold-glow), 0 0 60px rgba(255,215,0,0.1); }
        .cd img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.4s; }
        .cd.fo img { opacity: 0; }
        .cd::after { content: ''; position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border-radius: 50%; background: var(--sky-top); border: 2px solid rgba(255,255,255,0.1); transform: translate(-50%,-50%); z-index: 2; }
        @keyframes sp { to { transform: rotate(360deg); } }
        .ti { text-align: center; margin-bottom: 20px; width: 100%; padding: 0 8px; }
        .tn { font-size: 1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; min-height: 1.5em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ta { font-size: 0.8rem; color: var(--text); opacity: 0.4; min-height: 1.3em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pg { width: 100%; margin-bottom: 20px; padding: 0 4px; }
        .pb { width: 100%; height: 4px; background: rgba(196,206,248,0.08); border-radius: 2px; cursor: pointer; position: relative; }
        .pf { height: 100%; width: 0%; background: linear-gradient(90deg, rgba(255,215,0,0.5), var(--gold)); border-radius: 2px; transition: width 0.3s linear; position: relative; }
        .pf::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: var(--gold); opacity: 0; transition: opacity 0.2s; box-shadow: 0 0 8px rgba(255,215,0,0.5); }
        .pb:hover .pf::after { opacity: 1; }
        .pt { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.68rem; color: var(--text); opacity: 0.25; }
        .ctrls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 18px; }
        .cb { background: none; border: none; cursor: pointer; color: var(--text); opacity: 0.5; transition: all 0.25s; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; }
        .cb:hover { opacity: 1; color: var(--gold); transform: scale(1.12); }
        .cb svg { width: 20px; height: 20px; fill: currentColor; }
        .cbp { width: 56px; height: 56px; border: 2px solid rgba(255,215,0,0.2); background: rgba(255,215,0,0.04); color: var(--gold); opacity: 1; }
        .cbp:hover { background: rgba(255,215,0,0.1); border-color: var(--gold); box-shadow: 0 0 28px rgba(255,215,0,0.1); }
        .cbp svg { width: 24px; height: 24px; }
        .va { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .va svg { width: 16px; height: 16px; fill: var(--text); opacity: 0.25; }
        .vs { -webkit-appearance: none; appearance: none; width: 100px; height: 3px; background: rgba(196,206,248,0.1); border-radius: 2px; outline: none; }
        .vs::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 0 6px rgba(255,215,0,0.3); }
        .rcol { display: flex; flex-direction: column; min-width: 0; }
        .tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
        .tabs::-webkit-scrollbar { height: 0; }
        .tbn { flex-shrink: 0; padding: 6px 16px; font-size: 0.72rem; font-family: 'Noto Serif SC', serif; color: var(--text); opacity: 0.4; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; cursor: pointer; transition: all 0.25s; letter-spacing: 0.05em; }
        .tbn:hover { opacity: 0.7; background: rgba(255,255,255,0.04); }
        .tbn.on { color: var(--gold); opacity: 1; background: var(--gold-dim); border-color: rgba(255,215,0,0.15); }
        .tbn.ld { pointer-events: none; opacity: 0.3; }
        .sbar { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .sinp { flex: 1; padding: 9px 14px; font-size: 0.82rem; font-family: 'Noto Serif SC', serif; color: var(--text-bright); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; outline: none; transition: all 0.25s; }
        .sinp::placeholder { color: var(--text); opacity: 0.2; }
        .sinp:focus { border-color: rgba(255,215,0,0.2); background: rgba(255,255,255,0.04); }
        .scl { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(255,255,255,0.04); color: var(--text); opacity: 0.25; font-size: 1rem; cursor: pointer; display: none; align-items: center; justify-content: center; transition: all 0.2s; }
        .scl.show { display: flex; }
        .scl:hover { opacity: 0.7; color: var(--gold); }
        .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .ph-t { font-size: 0.75rem; color: var(--text); opacity: 0.22; letter-spacing: 0.12em; }
        .ph-c { font-size: 0.65rem; color: var(--text); opacity: 0.15; }
        .plist { max-height: 420px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,215,0,0.08) transparent; }
        .plist::-webkit-scrollbar { width: 3px; }
        .plist::-webkit-scrollbar-track { background: transparent; }
        .plist::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.1); border-radius: 2px; }
        .pi { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s; gap: 12px; }
        .pi:hover { background: rgba(255,255,255,0.03); }
        .pi.on { background: var(--gold-dim); }
        .pi.on .pn { color: var(--gold); font-weight: 700; }
        .pi.on .pi-i { color: var(--gold); opacity: 0.6; }
        .pi-i { font-size: 0.68rem; color: var(--text); opacity: 0.18; width: 24px; text-align: center; flex-shrink: 0; font-variant-numeric: tabular-nums; }
        .pn { font-size: 0.84rem; color: #dde0f0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .pa { font-size: 0.7rem; color: var(--text); opacity: 0.18; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; text-align: right; }
        .pi.on .pa { opacity: 0.5; }
        .pe { text-align: center; padding: 40px 0; font-size: 0.82rem; color: var(--text); opacity: 0.2; }
        .kbd { margin-top: 16px; text-align: center; font-size: 0.6rem; color: var(--text); opacity: 0.12; letter-spacing: 0.05em; line-height: 1.8; }
        #mb { position: fixed; left: -9999px; top: 0; width: 0; height: 0; overflow: hidden; pointer-events: none; }
        @media (max-width: 680px) {
            .grid { grid-template-columns: 1fr; gap: 24px; }
            .lcol { align-items: center; }
            body { padding: 16px; }
            .shell { padding: 28px 20px 24px; }
            .cd { width: 160px; height: 160px; }
            .ctrls { gap: 14px; }
            .cbp { width: 52px; height: 52px; }
            .plist { max-height: 320px; }
        }
        @media (max-width: 380px) {
            .shell { padding: 22px 14px 20px; }
            .cd { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow glow--1"></div>
<div class="glow glow--2"></div>

<div class="shell">
    <div class="hdr"><h1>芙芙播放器</h1><p>FU FU PLAYER</p></div>
    <div class="st" id="status"><span class="da">正在加载歌单</span></div>
    <div id="main" style="display:none;">
        <div class="grid">
            <div class="lcol">
                <div class="cw"><div class="cd" id="disc"><img id="cimg" src="" alt="" onerror="this.style.display='none'"></div></div>
                <div class="ti"><div class="tn" id="tn">--</div><div class="ta" id="ta">--</div></div>
                <div class="pg">
                    <div class="pb" id="pbar"><div class="pf" id="pfill"></div></div>
                    <div class="pt"><span id="tc">0:00</span><span id="tt">0:00</span></div>
                </div>
                <div class="ctrls">
                    <button class="cb" id="bSh" title="随机播放"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                    <button class="cb" id="bPr" title="上一首"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                    <button class="cb cbp" id="bPl" title="播放/暂停"><svg viewBox="0 0 24 24" id="icP"><path d="M8 5v14l11-7z"/></svg></button>
                    <button class="cb" id="bNx" title="下一首"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    <button class="cb" id="bLp" title="单曲循环"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
                </div>
                <div class="va">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <input type="range" class="vs" id="vol" min="0" max="100" value="70">
                </div>
            </div>
            <div class="rcol">
                <div class="tabs" id="tabs"></div>
                <div class="sbar">
                    <input type="text" class="sinp" id="sinp" placeholder="搜索曲名或作者...">
                    <button class="scl" id="scl">&times;</button>
                </div>
                <div class="ph">
                    <span class="ph-t" id="phT">播放列表</span>
                    <span class="ph-c" id="phC">0 首</span>
                </div>
                <div class="plist" id="plist"></div>
                <div class="kbd">空格 播放/暂停 &nbsp;|&nbsp; ← → 快退/快进 5s &nbsp;|&nbsp; ↑ ↓ 音量</div>
            </div>
        </div>
    </div>
</div>

<div id="mb"></div>

<script src="APlayer.min.js"></script>

<script>
/* ====================================================
   歌单配置 — 修改这里即可
   ==================================================== */
var PLAYLISTS = [
    { id: '493226074',  name: '默认歌单',       server: 'netease' },
    { id: '17982916375', name: 'hoyoMix每日更新', server: 'netease' },
    { id: '7225711996',  name: '旋曜玉帛',       server: 'netease' }
];

/* 代理配置 — Cloudflare Worker */
var PROXY_BASE = 'https://music.akira0803.workers.dev';
var PROXY_API  = PROXY_BASE + '/api';
var PROXY_AUDIO = PROXY_BASE + '/audio';

</script>

<script>
(function () {
'use strict';

/* ====================================================
   常量
   ==================================================== */
var LS_VOLUME   = 'ffp_volume';
var LS_LAST_IDX = 'ffp_lastIdx';
var LS_LAST_PL  = 'ffp_lastPL';
var RETRY_LIMIT = 3;
var FPS = 4;

/* ====================================================
   状态
   ==================================================== */
var ap = null;
var isPlaying = false;
var curPLIdx = parseInt(localStorage.getItem(LS_LAST_PL)) || 0;
if (curPLIdx >= PLAYLISTS.length) curPLIdx = 0;
var plCache = {};
var switching = false;
var pendingIdx = -1;
var suppressListSwitch = false;
var retryCount = 0;
var progressRAF = null;

/* ====================================================
   DOM 缓存
   ==================================================== */
var dom = {
    status: document.getElementById('status'),
    main:   document.getElementById('main'),
    cimg:   document.getElementById('cimg'),
    disc:   document.getElementById('disc'),
    tn:     document.getElementById('tn'),
    ta:     document.getElementById('ta'),
    pfill:  document.getElementById('pfill'),
    pbar:   document.getElementById('pbar'),
    tc:     document.getElementById('tc'),
    tt:     document.getElementById('tt'),
    icP:    document.getElementById('icP'),
    plist:  document.getElementById('plist'),
    tabs:   document.getElementById('tabs'),
    sinp:   document.getElementById('sinp'),
    scl:    document.getElementById('scl'),
    phT:    document.getElementById('phT'),
    phC:    document.getElementById('phC'),
    vol:    document.getElementById('vol'),
    bPl:    document.getElementById('bPl'),
    bPr:    document.getElementById('bPr'),
    bNx:    document.getElementById('bNx'),
    bSh:    document.getElementById('bSh'),
    bLp:    document.getElementById('bLp')
};

/* ====================================================
   工具
   ==================================================== */
function fmt(s) {
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}
function ck(pl) { return pl.server + '-' + pl.id; }

/* ====================================================
   持久化
   ==================================================== */
function saveVolume(v) {
    try { localStorage.setItem(LS_VOLUME, String(Math.round(v * 100))); } catch (_) {}
}
function loadVolume() {
    var v = parseInt(localStorage.getItem(LS_VOLUME));
    return isNaN(v) ? 70 : Math.max(0, Math.min(100, v));
}
function saveLastTrack() {
    if (!ap) return;
    try {
        localStorage.setItem(LS_LAST_IDX, String(ap.list.index));
        localStorage.setItem(LS_LAST_PL, String(curPLIdx));
    } catch (_) {}
}

/* ====================================================
   星星
   ==================================================== */
(function () {
    var c = document.getElementById('stars');
    var n = Math.min(120, Math.floor(window.innerWidth * 0.1));
    var f = document.createDocumentFragment();
    for (var i = 0; i < n; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random() < 0.85 ? (Math.random() * 2 + 0.5) : (Math.random() * 2 + 2);
        s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' +
            (Math.random() * 100).toFixed(1) + '%;left:' + (Math.random() * 100).toFixed(1) +
            '%;--lo:' + (Math.random() * 0.3 + 0.05).toFixed(2) +
            ';--hi:' + (Math.random() * 0.5 + 0.5).toFixed(2) +
            ';--d:' + (Math.random() * 4 + 2).toFixed(1) +
            's;animation-delay:' + (Math.random() * 5).toFixed(1) + 's;';
        f.appendChild(s);
    }
    c.appendChild(f);
})();

/* ====================================================
   提取 audios
   ==================================================== */
function extractAudios(aPlayer) {
    var result = [];
    var src = aPlayer.list.audios;
    for (var i = 0; i < src.length; i++) {
        var u = src[i].url;
        if (!u) continue;
        var proxyUrl = PROXY_AUDIO + '/' + encodeURIComponent(u);
        result.push({
            name:   src[i].name   || src[i].title  || '未知',
            artist: src[i].artist || src[i].author  || '',
            url:    proxyUrl,
            cover:  src[i].cover  || src[i].pic     || '',
            theme:  '#ffd700'
        });
    }
    return result;
}

/* ====================================================
   通过代理 API 加载歌单
   ==================================================== */
function loadViaMeting(pl) {
    return new Promise(function (resolve, reject) {
        var url = PROXY_API + '?server=' + pl.server + '&type=playlist&id=' + pl.id + '&r=' + Date.now();
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.timeout = 15000;
        xhr.onload = function () {
            if (xhr.status !== 200) { reject(new Error('API ' + xhr.status)); return; }
            try {
                var data = JSON.parse(xhr.responseText);
                var audios = [];
                for (var i = 0; i < data.length; i++) {
                    var item = data[i];
                    if (!item.url) continue;
                    audios.push({
                        name:   item.title  || item.name  || '未知',
                        artist: item.author || item.artist || '',
                        url:    PROXY_AUDIO + '/' + encodeURIComponent(item.url),
                        cover:  item.pic    || item.cover  || '',
                        theme:  '#ffd700'
                    });
                }
                resolve(audios);
            } catch (e) { reject(new Error('parse error')); }
        };
        xhr.onerror = function () { reject(new Error('network')); };
        xhr.ontimeout = function () { reject(new Error('timeout')); };
        xhr.send();
    });
}

/* ====================================================
   应用数据到 APlayer
   ==================================================== */
function applyToPlayer(audios) {
    var copy = (typeof structuredClone === 'function')
        ? structuredClone(audios)
        : JSON.parse(JSON.stringify(audios));
    suppressListSwitch = true;
    ap.list.clear();
    ap.list.add(copy);
    suppressListSwitch = false;
    buildList(copy);
    if (copy.length > 0) ap.list.switch(0);
}

/* ====================================================
   列表 UI（DocumentFragment 批量构建）
   ==================================================== */
function buildList(tracks) {
    var frag = document.createDocumentFragment();
    for (var i = 0; i < tracks.length; i++) {
        var d = document.createElement('div');
        d.className = 'pi' + (i === ap.list.index ? ' on' : '');
        d.dataset.ri = i;

        var idxSpan = document.createElement('span');
        idxSpan.className = 'pi-i';
        idxSpan.textContent = i + 1;

        var nameSpan = document.createElement('span');
        nameSpan.className = 'pn';
        nameSpan.textContent = tracks[i].name || '未知';

        var artistSpan = document.createElement('span');
        artistSpan.className = 'pa';
        artistSpan.textContent = tracks[i].artist || '';

        d.appendChild(idxSpan);
        d.appendChild(nameSpan);
        d.appendChild(artistSpan);
        frag.appendChild(d);
    }

    var emp = document.createElement('div');
    emp.className = 'pe';
    emp.id = 'plEmp';
    emp.textContent = '未找到匹配的歌曲';
    emp.style.display = 'none';
    frag.appendChild(emp);

    dom.plist.innerHTML = '';
    dom.plist.appendChild(frag);

    dom.phC.textContent = tracks.length + ' 首';
    filterList(dom.sinp.value);
}

/* ====================================================
   列表过滤
   ==================================================== */
function filterList(keyword) {
    var kw = (keyword || '').toLowerCase();
    var items = dom.plist.querySelectorAll('.pi');
    var shown = 0;
    for (var i = 0; i < items.length; i++) {
        var nm = items[i].querySelector('.pn').textContent.toLowerCase();
        var ar = items[i].querySelector('.pa').textContent.toLowerCase();
        var match = !kw || nm.indexOf(kw) !== -1 || ar.indexOf(kw) !== -1;
        items[i].style.display = match ? '' : 'none';
        if (match) {
            shown++;
            items[i].querySelector('.pi-i').textContent = shown;
        }
    }
    dom.phC.textContent = shown + ' 首';
    var emp = document.getElementById('plEmp');
    if (emp) emp.style.display = (shown === 0 && kw) ? '' : 'none';
}

/* ====================================================
   歌曲 UI 更新
   ==================================================== */
function updateTrackUI(idx) {
    var tracks = ap.list.audios;
    if (idx < 0 || idx >= tracks.length) return;
    var t = tracks[idx];

    dom.disc.classList.add('fo');
    setTimeout(function () {
        dom.cimg.src = t.cover || '';
        dom.cimg.style.display = t.cover ? '' : 'none';
        dom.disc.classList.remove('fo');
    }, 300);

    dom.tn.textContent = t.name || '未知';
    dom.ta.textContent = t.artist || '';

    var items = dom.plist.querySelectorAll('.pi');
    for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle('on', +items[i].dataset.ri === idx);
    }
    var ac = dom.plist.querySelector('.pi.on');
    if (ac && ac.style.display !== 'none') {
        ac.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    updateMediaSession(t);
    saveLastTrack();
}

/* ====================================================
   Media Session API
   ==================================================== */
function updateMediaSession(track) {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
        title: track.name || '未知',
        artist: track.artist || '',
        artwork: track.cover ? [{ src: track.cover, sizes: '200x200', type: 'image/jpeg' }] : []
    });
}

function bindMediaSession() {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.setActionHandler('play',  function () { if (ap) ap.play(); });
    navigator.mediaSession.setActionHandler('pause', function () { if (ap) ap.pause(); });
    navigator.mediaSession.setActionHandler('previoustrack', function () {
        if (!ap) return;
        var i = (ap.list.index - 1 + ap.list.audios.length) % ap.list.audios.length;
        ap.list.switch(i); setTimeout(function () { ap.play(); }, 80);
    });
    navigator.mediaSession.setActionHandler('nexttrack', function () {
        if (!ap) return;
        var i = (ap.list.index + 1) % ap.list.audios.length;
        ap.list.switch(i); setTimeout(function () { ap.play(); }, 80);
    });
}

/* ====================================================
   播放/暂停图标
   ==================================================== */
function showPauseIcon() {
    dom.icP.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    dom.disc.classList.add('on');
    isPlaying = true;
    startProgressLoop();
}
function showPlayIcon() {
    dom.icP.innerHTML = '<path d="M8 5v14l11-7z"/>';
    dom.disc.classList.remove('on');
    isPlaying = false;
}

/* ====================================================
   进度条（requestAnimationFrame，暂停时不消耗）
   ==================================================== */
var lastProgressUpdate = 0;
function progressTick(ts) {
    if (!isPlaying || !ap || !ap.audio) { progressRAF = null; return; }
    if (ts - lastProgressUpdate < 1000 / FPS) {
        progressRAF = requestAnimationFrame(progressTick);
        return;
    }
    lastProgressUpdate = ts;
    var c = ap.audio.currentTime || 0;
    var d = ap.audio.duration || 0;
    dom.tc.textContent = fmt(c);
    dom.tt.textContent = fmt(d);
    dom.pfill.style.width = d > 0 ? ((c / d) * 100).toFixed(2) + '%' : '0%';
    progressRAF = requestAnimationFrame(progressTick);
}
function startProgressLoop() {
    if (!progressRAF) progressRAF = requestAnimationFrame(progressTick);
}

/* ====================================================
   Tab
   ==================================================== */
function buildTabs() {
    var frag = document.createDocumentFragment();
    for (var i = 0; i < PLAYLISTS.length; i++) {
        var b = document.createElement('button');
        b.className = 'tbn' + (i === curPLIdx ? ' on' : '');
        b.textContent = PLAYLISTS[i].name;
        b.addEventListener('click', (function (idx) {
            return function () { switchPlaylist(idx); };
        })(i));
        frag.appendChild(b);
    }
    dom.tabs.innerHTML = '';
    dom.tabs.appendChild(frag);
}

/* ====================================================
   切换歌单
   ==================================================== */
function switchPlaylist(idx) {
    if (idx === curPLIdx && ap && ap.list.audios.length > 0) return;

    var pl = PLAYLISTS[idx];
    var key = ck(pl);
    var cached = !!plCache[key];

    curPLIdx = idx;
    try { localStorage.setItem(LS_LAST_PL, String(idx)); } catch (_) {}

    var btns = dom.tabs.querySelectorAll('.tbn');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('on', 'ld');
        if (i === idx) {
            btns[i].classList.add('on');
            if (!cached) btns[i].classList.add('ld');
        }
    }

    dom.sinp.value = '';
    dom.scl.classList.remove('show');
    dom.phT.textContent = pl.name;

    if (cached) {
        applyToPlayer(plCache[key]);
    } else {
        if (switching) { pendingIdx = idx; return; }

        switching = true;
        dom.plist.innerHTML = '<div class="pe"><span class="da">加载中</span></div>';
        dom.phC.textContent = '--';

        loadViaMeting(pl).then(function (audios) {
            if (curPLIdx !== idx && pendingIdx === -1) return;
            plCache[key] = audios;
            applyToPlayer(audios);
        }).catch(function () {
            if (curPLIdx !== idx) return;
            dom.plist.innerHTML = '<div class="pe">加载失败，请检查歌单ID和网络</div>';
            dom.phC.textContent = '0 首';
        }).finally(function () {
            switching = false;
            var btns = dom.tabs.querySelectorAll('.tbn');
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove('ld');

            if (pendingIdx !== -1 && pendingIdx !== curPLIdx) {
                var next = pendingIdx;
                pendingIdx = -1;
                switchPlaylist(next);
            } else {
                pendingIdx = -1;
            }
        });
    }
}

/* ====================================================
   搜索
   ==================================================== */
var searchTimer = null;
dom.sinp.addEventListener('input', function () {
    var v = dom.sinp.value.trim();
    dom.scl.classList.toggle('show', v.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function () { filterList(v); }, 200);
});
dom.scl.addEventListener('click', function () {
    dom.sinp.value = '';
    dom.scl.classList.remove('show');
    filterList('');
    dom.sinp.focus();
});

/* ====================================================
   列表事件委托
   ==================================================== */
dom.plist.addEventListener('click', function (e) {
    var item = e.target.closest('.pi');
    if (!item || !ap) return;
    var idx = +item.dataset.ri;
    ap.list.switch(idx);
    setTimeout(function () { ap.play(); }, 80);
});

/* ====================================================
   控件
   ==================================================== */
dom.bPl.onclick = function () { isPlaying ? ap.pause() : ap.play(); };
dom.bPr.onclick = function () {
    var i = (ap.list.index - 1 + ap.list.audios.length) % ap.list.audios.length;
    ap.list.switch(i); setTimeout(function () { ap.play(); }, 80);
};
dom.bNx.onclick = function () {
    var i = (ap.list.index + 1) % ap.list.audios.length;
    ap.list.switch(i); setTimeout(function () { ap.play(); }, 80);
};
dom.bSh.onclick = function () {
    if (ap.list.audios.length < 2) return;
    var r; do { r = Math.floor(Math.random() * ap.list.audios.length); } while (r === ap.list.index);
    ap.list.switch(r); setTimeout(function () { ap.play(); }, 80);
};
dom.bLp.onclick = function () { ap.seek(0); ap.play(); };

/* 音量：持久化 */
var savedVol = loadVolume();
dom.vol.value = savedVol;
dom.vol.oninput = function () {
    var v = this.value / 100;
    ap.volume(v, true);
    saveVolume(v);
};

/* 进度条：点击 + 拖拽 seek */
var seeking = false;
function seekFromEvent(e) {
    var r = dom.pbar.getBoundingClientRect();
    var p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    if (ap && ap.audio && ap.audio.duration && isFinite(ap.audio.duration)) {
        ap.seek(p * ap.audio.duration);
    }
}
dom.pbar.addEventListener('mousedown', function (e) {
    seeking = true;
    dom.pfill.style.transition = 'none';
    seekFromEvent(e);
});
document.addEventListener('mousemove', function (e) {
    if (!seeking) return;
    var r = dom.pbar.getBoundingClientRect();
    var p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    dom.pfill.style.width = (p * 100).toFixed(2) + '%';
    seekFromEvent(e);
});
document.addEventListener('mouseup', function () {
    if (seeking) {
        seeking = false;
        dom.pfill.style.transition = '';
    }
});

/* ====================================================
   绑定 APlayer 事件
   ==================================================== */
function bindEvents() {
    ap.on('play', showPauseIcon);
    ap.on('pause', showPlayIcon);
    ap.on('listswitch', function (data) {
        if (!suppressListSwitch) updateTrackUI(data.index);
    });
    ap.on('ended', function () {
        retryCount = 0;
        var next = (ap.list.index + 1) % ap.list.audios.length;
        ap.list.switch(next);
        setTimeout(function () { ap.play(); }, 100);
    });

    /* 音频错误自动重试 */
    ap.audio.addEventListener('error', function () {
        retryCount++;
        if (retryCount <= RETRY_LIMIT) {
            setTimeout(function () { ap.play(); }, 1000);
        } else {
            retryCount = 0;
            var next = (ap.list.index + 1) % ap.list.audios.length;
            ap.list.switch(next);
            setTimeout(function () { ap.play(); }, 200);
        }
    });
    ap.audio.addEventListener('playing', function () { retryCount = 0; });

    ap.volume(savedVol / 100, true);
    bindMediaSession();
}

/* ====================================================
   键盘快捷键
   ==================================================== */
document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || !ap) return;
    switch (e.code) {
        case 'Space':
            e.preventDefault(); isPlaying ? ap.pause() : ap.play(); break;
        case 'ArrowLeft':
            e.preventDefault(); ap.seek(Math.max(0, (ap.audio.currentTime || 0) - 5)); break;
        case 'ArrowRight':
            e.preventDefault(); ap.seek(Math.min(ap.audio.duration || 0, (ap.audio.currentTime || 0) + 5)); break;
        case 'ArrowUp': {
            e.preventDefault();
            var v1 = Math.min(1, (ap.audio.volume || 0) + 0.1);
            ap.volume(v1, true); dom.vol.value = Math.round(v1 * 100); saveVolume(v1); break;
        }
        case 'ArrowDown': {
            e.preventDefault();
            var v2 = Math.max(0, (ap.audio.volume || 0) - 0.1);
            ap.volume(v2, true); dom.vol.value = Math.round(v2 * 100); saveVolume(v2); break;
        }
    }
});

/* ====================================================
   启动
   ==================================================== */
buildTabs();
dom.phT.textContent = PLAYLISTS[curPLIdx].name;

loadViaMeting(PLAYLISTS[0]).then(function (audios) {
    plCache[ck(PLAYLISTS[0])] = audios;

    ap = new APlayer({
        container: document.getElementById('mb'),
        audio: audios,
        mini: false,
        autoplay: false,
        lrcType: 0,
        mutex: true,
        theme: '#ffd700'
    });

    bindEvents();
    buildList(audios);

    /* 恢复上次播放位置 */
    var lastIdx = parseInt(localStorage.getItem(LS_LAST_IDX));
    if (!isNaN(lastIdx) && lastIdx >= 0 && lastIdx < ap.list.audios.length) {
        ap.list.switch(lastIdx);
    }
    updateTrackUI(ap.list.index);

    dom.status.style.display = 'none';
    dom.main.style.display = 'block';
}).catch(function (err) {
    console.error('Load failed:', err);
    dom.status.innerHTML = '加载失败，请检查：<br><br>1. 歌单 ID 是否正确<br>2. 歌单是否为公开状态<br>3. 网络是否可用<br><br><span style="font-size:0.75rem;opacity:0.4">可刷新页面重试</span>';
    dom.status.style.textAlign = 'center';
    dom.status.style.lineHeight = '2';
});

})();
</script>
</body>
